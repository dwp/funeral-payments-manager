{% extends "layouts/main6.html" %}

{% block pageTitle %}
  Find a claim – {{ serviceName }} – GOV.UK Prototype Kit
{% endblock %}

{% block content %}

<div class="govuk-grid-row">
 <div class="govuk-grid-column-two-thirds">

 <h1 class="govuk-heading-l">Find a claim</h1>

 <div class="moj-search">
  <form action="" method="post">
    <div class="govuk-form-group">
      <label class="govuk-label moj-search__label" for="search">
        Enter claimant's National Insurance number
      </label>
      <input class="govuk-input govuk-input--width-10 moj-search__input " id="search" name="claimantnino" type="search" aria-describedby="search-hint" value="{{ data.ninoc }}">
      <button type="submit" class="govuk-button" data-module="govuk-button" 
      style= "margin-left: 6px;">
        Search
      </button>
    </div> 
  </form>

  <h2 class="govuk-heading-m">Search results</h2>

  <p class="govuk-body" style="margin-bottom: 4px">
    <a href="/v6/c/tasklist" class="govuk-link govuk-link--no-visited-state">Active claim</a></p>
    <p class="govuk-body-s">Dawn Mira<br>28 January 2026</p> 

</div>


{% endblock %}
