{% extends "layouts/main6.html" %}

{% block pageTitle %}
  Find a claim – {{ serviceName }} – GOV.UK Prototype Kit
{% endblock %}

{% block content %}

<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">

 <h1 class="govuk-heading-l">Find a claim</h1>

 <div class="moj-search">
  <form action="/v6/b/find-a-claim-results" method="post">

    <div class="govuk-form-group">
      <label class="govuk-label moj-search__label" for="search">
        Enter claimant's National Insurance number
      </label>
      <input class="govuk-input govuk-input--width-10 moj-search__input " id="search" name="ninob" type="search" aria-describedby="search-hint">
      <button type="submit" class="govuk-button" data-module="govuk-button" 
      style= "margin-left: 6px;">
        Search
      </button>
    </div>
    
  </form>

</div>


{% endblock %}
