{% extends "layouts/main7.html" %}

{% block pageTitle %}
  Start a claim – {{ serviceName }} – GOV.UK Prototype Kit
{% endblock %}

{% block content %}

<div class="govuk-grid-row">
  <div class="govuk-grid-column-two-thirds">


 <h1 class="govuk-heading-l">Search for the claimant</h1>

 <div class="moj-search">
  <form action="/v7/reg/start-claim-results" method="post">
    <div class="govuk-form-group">
      <label class="govuk-label moj-search__label" for="search">
        Claimant's National Insurance number
      </label>
      <input class="govuk-input govuk-input--width-10 moj-search__input " id="search" name="claimantnino" type="search" aria-describedby="search-hint">
      <button type="submit" class="govuk-button" data-module="govuk-button" 
      style= "margin-left: 6px;">
        Search
      </button>
    </div>
    
  </form>
</div>

  </div>
</div>


{% endblock %}
